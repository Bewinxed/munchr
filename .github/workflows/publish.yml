name: Publish to npm

on:
  push:
    branches: [main]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if version unchanged
        if: steps.version.outputs.changed != 'true'
        run: echo "Version unchanged (${{ steps.version.outputs.current }}), skipping publish."

      - uses: oven-sh/setup-bun@v2
        if: steps.version.outputs.changed == 'true'
        with:
          bun-version: latest

      - name: Setup Node
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install and build
        if: steps.version.outputs.changed == 'true'
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Type check
        if: steps.version.outputs.changed == 'true'
        run: bunx tsc --noEmit

      - name: Lint
        if: steps.version.outputs.changed == 'true'
        run: bunx oxlint

      - name: Publish to npm (OIDC provenance)
        if: steps.version.outputs.changed == 'true'
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --provenance --access public

      - name: Create git tag
        if: steps.version.outputs.changed == 'true'
        run: |
          VERSION="v${{ steps.version.outputs.current }}"
          git tag "$VERSION"
          git push origin "$VERSION"

